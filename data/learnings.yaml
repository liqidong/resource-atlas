learnings:
  - learning_id: learn_20260518_multi_agent_intake_default
    date: 2026-05-18
    type: preference
    trigger: User asked that future intake should use multi-agent high-quality review.
    root_cause: Single-pass intake can miss source facts, value judgment issues, update risks, and public-readiness concerns.
    future_rule: Future full-analysis intake should use at least a source/structure reviewer and a value/use-case reviewer when tools allow it.
    applies_to:
      - full-analysis
      - refresh-update
      - resource-review
    status: promoted
    promoted_to:
      - AGENTS.md
      - docs/intake-policy.md
    note: This is a user-stated workflow preference, not merely an inferred process improvement.
  - learning_id: learn_20260518_verify_local_claims_network_boundary
    date: 2026-05-18
    type: quality_bar
    trigger: Local Deep Researcher is described as fully local, but source review showed search and optional full-page fetch can still use external network services.
    root_cause: Local/private claims often apply to one subsystem, such as the LLM, not the entire workflow.
    future_rule: For resources claiming local, private, offline, or self-hosted behavior, verify every network boundary before writing the verdict.
    applies_to:
      - full-analysis
      - privacy-review
      - local-first-resources
    status: promoted
    promoted_to:
      - AGENTS.md
    note: This prevents overstating privacy or local execution guarantees.
  - learning_id: learn_20260518_calibrate_public_intake_metadata
    date: 2026-05-18
    type: quality_bar
    trigger: Intake review found that a caveated narrative judgment could be flattened into a plain machine-readable recommendation, and validation evidence could leak temporary clone paths into public-ready pages.
    root_cause: Resource pages, data records, and source manifests are written in parallel, so narrative nuance and public hygiene can drift unless there is a final calibration pass.
    future_rule: Before finalizing a public-ready intake, align machine-readable recommendation fields with narrative caveats, treat community metrics as volatile advisory signal, and avoid absolute temporary or home-directory paths in evidence notes.
    applies_to:
      - full-analysis
      - refresh-update
      - public-redaction
    status: promoted
    promoted_to:
      - AGENTS.md
      - docs/intake-policy.md
      - docs/public-redaction-policy.md
    note: This keeps future entries more useful for automated lookup and safer to publish.
  - learning_id: learn_20260518_agent_stewardship_contract
    date: 2026-05-18
    type: preference
    trigger: User clarified that every future agent should enter Resource Atlas as the repository manager and should not require the user to restate standard intake responsibilities.
    root_cause: The repository had intake rules, but not a strong role definition saying that agents own the default management workflow when a new resource is dropped in.
    future_rule: "Agents entering Resource Atlas must treat themselves as stewards: infer the intake mode, gather evidence, update canonical files, run validation, and only ask when a missing decision is unsafe to infer."
    applies_to:
      - full-analysis
      - quick-card
      - refresh-update
      - agent-onboarding
    status: promoted
    promoted_to:
      - AGENTS.md
      - CLAUDE.md
      - docs/intake-policy.md
      - scripts/validate-atlas.rb
    note: This turns the repository from user-driven note taking into agent-managed resource stewardship.
  - learning_id: learn_20260518_long_term_atlas_stewardship
    date: 2026-05-18
    type: preference
    trigger: User described the long-term vision that Resource Atlas agents should learn from the growing library, understand the user's interests, suggest new resources, and refresh stale entries with user review.
    root_cause: The stewardship contract defined agent responsibility for intake, but did not yet capture the larger ambition of an evolving agent-managed resource memory and interest model.
    future_rule: Agents should treat accumulated resources, use cases, judgments, and learnings as evidence for the user's evolving interest model; use it to propose candidates and refreshes, while keeping user approval before proactive discoveries become canonical full analyses.
    applies_to:
      - agent-onboarding
      - proactive-discovery
      - refresh-update
      - resource-review
      - interest-modeling
    status: promoted
    promoted_to:
      - AGENTS.md
      - README.md
      - docs/stewardship-vision.md
      - docs/update-policy.md
    note: This records the phase change from command-following intake to long-term agent stewardship.
  - learning_id: learn_20260518_one_resource_worktree_intake
    date: 2026-05-18
    type: process
    trigger: Review found that several resource intakes were created as named branches but the final work was bundled into one single-resource branch commit.
    root_cause: Branch switching inside one working directory allowed uncommitted intake work to drift across branch names, so branch names no longer represented isolated resource scopes.
    future_rule: Default intake isolation is one resource, one branch, one git worktree, and one resource-scoped commit. Multiple resources should use sibling worktrees or explicit batch mode with one commit per resource.
    applies_to:
      - full-analysis
      - quick-card
      - refresh-update
      - branch-management
      - multi-resource-intake
    status: promoted
    promoted_to:
      - AGENTS.md
      - docs/intake-policy.md
    note: This preserves review, rollback, and provenance when several resources are collected in parallel.
  - learning_id: learn_20260518_validate_bulk_intake_drift
    date: 2026-05-18
    type: process
    trigger: Post-bulk intake review found that the validator passed even though wiki index entries, data/frontmatter fields, source metadata, and learning statuses had drifted.
    root_cause: The initial validator checked only a narrow subset of resource fields and did not validate front-door indexes, source metadata/manifests, learning page status, or branch-scope policy.
    future_rule: After batch or multi-branch intake, validate canonical data against page frontmatter, front-door indexes, source metadata/manifests, learning pages, and branch scope before merging or pushing.
    applies_to:
      - full-analysis
      - quick-card
      - multi-resource-intake
      - branch-management
      - validation
    status: promoted
    promoted_to:
      - scripts/validate-atlas.rb
      - docs/intake-policy.md
    note: This turns reviewer-caught drift into automated validation coverage.
  - learning_id: learn_20260518_cross_window_submission_completion
    date: 2026-05-18
    type: process
    trigger: User found that a resource submitted from another window was present on origin/main but not visible in the current window's README.
    root_cause: Submission was treated as complete after the remote commit landed, but the current workspace remained behind origin/main with local WIP, so the front-door check in this window saw stale files.
    future_rule: A submit or finish request is complete only after validating the atlas, confirming the upstream commit SHA, checking README/wiki front-door visibility when applicable, and syncing or explicitly reporting any current-window divergence from origin/main.
    applies_to:
      - full-analysis
      - quick-card
      - refresh-update
      - branch-management
      - submission
      - validation
    status: promoted
    promoted_to:
      - AGENTS.md
      - docs/intake-policy.md
      - scripts/validate-atlas.rb
    note: This prevents cross-window completion reports from hiding that the user's visible checkout is stale.
  - learning_id: learn_20260518_validator_ruby26_compatibility
    date: 2026-05-18
    type: process
    trigger: CLI-Anything intake verification found that the atlas validator failed under the default Ruby 2.6 runtime because it used Array#filter_map.
    root_cause: The validator had adopted a Ruby 2.7 convenience method without declaring or enforcing a newer Ruby runtime.
    future_rule: Keep repository validation scripts compatible with the default supported local runtime, or explicitly document and enforce the newer runtime before relying on the script in intake completion.
    applies_to:
      - validation
      - full-analysis
      - branch-management
      - submission
    status: promoted
    promoted_to:
      - scripts/validate-atlas.rb
    note: The validator now uses map plus compact for branch-scope path collection so direct ruby invocation works on Ruby 2.6.
